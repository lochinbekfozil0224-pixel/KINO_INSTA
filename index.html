<!DOCTYPE html>
<html lang="uz">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<title>MezzaFilm — Kod yuborish</title>
<style>
  :root{
    --bg-0:#06050a;
    --bg-1:#0d0a1a;
    --violet:#6c4cf5;
    --violet-2:#9b7bff;
    --ember:#ff7a4d;
    --paper:#f3efe9;
    --dim:#9b94b3;
    --line:rgba(255,255,255,0.08);
  }

  *{box-sizing:border-box;}
  html,body{margin:0;padding:0;}

  body{
    min-height:100vh;
    background:
      radial-gradient(ellipse 80% 50% at 50% -10%, rgba(108,76,245,0.25), transparent 60%),
      radial-gradient(ellipse 60% 40% at 80% 100%, rgba(255,122,77,0.10), transparent 60%),
      linear-gradient(180deg,var(--bg-0),var(--bg-1));
    font-family:'Manrope',-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;
    color:var(--paper);
    display:flex;
    flex-direction:column;
    align-items:center;
    justify-content:center;
    overflow-x:hidden;
    position:relative;
  }

  /* starfield */
  .stars{
    position:fixed;
    inset:0;
    z-index:0;
    pointer-events:none;
  }
  .stars span{
    position:absolute;
    width:2px;height:2px;
    background:#fff;
    border-radius:50%;
    opacity:0.5;
    animation:twinkle 3.5s ease-in-out infinite;
  }
  @keyframes twinkle{
    0%,100%{opacity:0.15;}
    50%{opacity:0.9;}
  }

  .wrap{
    position:relative;
    z-index:1;
    width:100%;
    max-width:420px;
    padding:48px 28px 56px;
    display:flex;
    flex-direction:column;
    align-items:center;
    text-align:center;
  }

  .mark{
    display:flex;
    align-items:center;
    gap:10px;
    padding:14px 26px;
    border:1px solid var(--line);
    border-radius:999px;
    background:rgba(255,255,255,0.03);
    box-shadow:0 0 40px rgba(108,76,245,0.25);
    margin-bottom:38px;
  }
  .mark .reel{font-size:22px;line-height:1;}
  .mark .name{
    font-family:'Playfair Display',Georgia,serif;
    font-weight:700;
    font-size:26px;
    letter-spacing:0.5px;
    background:linear-gradient(90deg,var(--violet-2),var(--ember));
    -webkit-background-clip:text;
    background-clip:text;
    color:transparent;
  }

  .eyebrow{
    font-size:12px;
    letter-spacing:3px;
    text-transform:uppercase;
    color:var(--ember);
    font-weight:700;
    margin-bottom:18px;
  }

  h1{
    font-family:'Playfair Display',Georgia,serif;
    font-weight:700;
    font-size:38px;
    line-height:1.15;
    margin:0 0 16px;
  }
  h1 span{
    background:linear-gradient(90deg,var(--violet-2),#c9b6ff);
    -webkit-background-clip:text;
    background-clip:text;
    color:transparent;
  }

  p.lead{
    color:var(--dim);
    font-size:15.5px;
    line-height:1.6;
    max-width:340px;
    margin:0 0 44px;
  }

  .clapper{
    font-size:54px;
    margin-bottom:28px;
    filter:drop-shadow(0 0 18px rgba(108,76,245,0.5));
  }

  .cta{
    width:100%;
    display:flex;
    align-items:center;
    justify-content:center;
    gap:12px;
    padding:19px 24px;
    border-radius:18px;
    border:none;
    background:linear-gradient(95deg,var(--violet),#8a5cf6);
    color:#fff;
    font-size:17px;
    font-weight:700;
    letter-spacing:0.3px;
    text-decoration:none;
    box-shadow:0 12px 30px rgba(108,76,245,0.45), inset 0 1px 0 rgba(255,255,255,0.15);
    transition:transform 0.15s ease, box-shadow 0.15s ease;
    -webkit-tap-highlight-color:transparent;
  }
  .cta:active{
    transform:scale(0.97);
    box-shadow:0 6px 18px rgba(108,76,245,0.4), inset 0 1px 0 rgba(255,255,255,0.1);
  }
  .cta svg{width:20px;height:20px;flex-shrink:0;}

  .foot{
    margin-top:28px;
    font-size:12.5px;
    color:#5e5876;
    letter-spacing:0.3px;
  }

  @media (prefers-reduced-motion: reduce){
    .stars span{animation:none;}
  }
</style>
</head>
<body>

<div class="stars" id="stars"></div>

<div class="wrap">
  <div class="mark">
    <span class="reel">🎬</span>
    <span class="name">MezzaFilm</span>
  </div>

  <div class="eyebrow">Kino &amp; video kodi</div>

  <div class="clapper">🍿</div>

  <h1>film kodini<br><span>botga yuboring</span></h1>

  <p class="lead">
    Sevimli kino yoki video kodini kiriting va lavhani bir zumda
    Telegram orqali tomosha qiling.
  </p>

  <a class="cta" href="https://t.me/mezzafilm_bot" id="ctaBtn">
    <svg viewBox="0 0 240 240" fill="none" xmlns="http://www.w3.org/2000/svg">
      <circle cx="120" cy="120" r="120" fill="white" fill-opacity="0.0001"/>
      <path d="M170 72L43 122c-8 3-8 9-1 12l31 10 12 38c2 6 5 7 9 4l24-19 27 20c5 4 9 2 11-5l25-115c3-9-3-13-11-9z" fill="#fff"/>
      <path d="M99 168l-3 33c4 0 6-2 9-5l21-20-27-8z" fill="#0d0a1a"/>
    </svg>
    Kod yuborish
  </a>

  <div class="foot">@mezzafilm_bot</div>
</div>

<script>
  // generate scattered stars
  const starsContainer = document.getElementById('stars');
  const starCount = 70;
  for (let i = 0; i < starCount; i++) {
    const s = document.createElement('span');
    s.style.left = Math.random() * 100 + '%';
    s.style.top = Math.random() * 100 + '%';
    s.style.animationDelay = (Math.random() * 3.5) + 's';
    const size = Math.random() * 1.5 + 1;
    s.style.width = size + 'px';
    s.style.height = size + 'px';
    starsContainer.appendChild(s);
  }
</script>

</body>
</html>
